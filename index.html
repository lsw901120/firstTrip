<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#e8edf0" />
    <meta
      name="description"
      content="속초·양양·강릉에서 함께 저장한 장소 14곳과 숙소를 한 지도에서 확인하세요."
    />
    <title>속초·양양·강릉 여행 링크</title>
    <link rel="preconnect" href="https://basemaps.cartocdn.com" />
    <link
      rel="stylesheet"
      href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
      integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
      crossorigin=""
    />
    <style>
      :root {
        color-scheme: light;
        font-family:
          Inter, Pretendard, -apple-system, BlinkMacSystemFont, "Apple SD Gothic Neo",
          "Noto Sans KR", sans-serif;
        color: #17242d;
        background: #e8edf0;
        font-synthesis: none;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        min-height: 100%;
        margin: 0;
      }

      body {
        overflow: hidden;
        background: #e8edf0;
      }

      button,
      a {
        font: inherit;
      }

      button {
        color: inherit;
      }

      [hidden] {
        display: none !important;
      }

      .travel-app {
        position: relative;
        width: min(100%, 540px);
        height: 100svh;
        min-height: 620px;
        margin: 0 auto;
        overflow: hidden;
        background: #dce9ef;
        box-shadow: 0 0 56px rgba(17, 34, 46, 0.18);
      }

      #map {
        position: absolute;
        inset: 0;
        z-index: 0;
        background:
          radial-gradient(circle at 70% 22%, rgba(255, 255, 255, 0.6), transparent 24%),
          #dce9ef;
      }

      .map-header {
        position: absolute;
        z-index: 800;
        top: max(14px, env(safe-area-inset-top));
        left: 14px;
        right: 14px;
        display: flex;
        align-items: center;
        gap: 12px;
        min-height: 94px;
        padding: 14px 15px;
        border: 1px solid rgba(255, 255, 255, 0.78);
        border-radius: 22px;
        background: rgba(255, 255, 255, 0.94);
        box-shadow: 0 10px 32px rgba(27, 48, 62, 0.16);
        backdrop-filter: blur(16px);
      }

      .header-copy {
        min-width: 0;
        flex: 1;
      }

      .eyebrow {
        margin: 0 0 5px;
        color: #df4b66;
        font-size: 10px;
        font-weight: 800;
        letter-spacing: 0.17em;
      }

      .map-header h1 {
        overflow: hidden;
        margin: 0;
        font-size: clamp(21px, 6.5vw, 27px);
        line-height: 1.05;
        letter-spacing: -0.045em;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .place-count {
        margin: 6px 0 0;
        color: #687983;
        font-size: 12px;
      }

      .overview-button {
        flex: 0 0 auto;
        min-width: 72px;
        min-height: 44px;
        padding: 0 13px;
        border: 0;
        border-radius: 14px;
        background: #17242d;
        color: #fff;
        font-size: 12px;
        font-weight: 800;
        cursor: pointer;
      }

      .overview-button:focus-visible,
      .current-location-button:focus-visible,
      .sheet-toggle:focus-visible,
      .place-list-button:focus-visible,
      .naver-link:focus-visible,
      .naver-route-link:focus-visible {
        outline: 3px solid rgba(242, 90, 115, 0.42);
        outline-offset: 2px;
      }

      .map-warning {
        position: absolute;
        z-index: 780;
        top: calc(max(14px, env(safe-area-inset-top)) + 106px);
        left: 14px;
        right: 14px;
        margin: 0;
        padding: 11px 13px;
        border: 1px solid rgba(255, 255, 255, 0.8);
        border-radius: 13px;
        background: rgba(255, 255, 255, 0.96);
        color: #7d3341;
        font-size: 12px;
        line-height: 1.45;
        box-shadow: 0 7px 20px rgba(27, 48, 62, 0.14);
      }

      .current-location-button {
        position: absolute;
        z-index: 790;
        left: 12px;
        bottom: calc(250px + env(safe-area-inset-bottom));
        display: inline-flex;
        min-height: 44px;
        align-items: center;
        gap: 7px;
        padding: 0 13px;
        border: 0;
        border-radius: 14px;
        background: rgba(255, 255, 255, 0.96);
        color: #17242d;
        font-size: 12px;
        font-weight: 850;
        box-shadow: 0 6px 22px rgba(24, 43, 55, 0.19);
        cursor: pointer;
        transition:
          opacity 0.2s ease,
          background 0.2s ease,
          color 0.2s ease;
      }

      .current-location-button[aria-pressed="true"] {
        background: #2483e2;
        color: #fff;
      }

      .current-location-button[aria-busy="true"] .location-icon {
        animation: location-pulse 0.9s ease-in-out infinite alternate;
      }

      .location-icon {
        font-size: 19px;
        line-height: 1;
      }

      .location-status {
        position: absolute;
        z-index: 795;
        left: 12px;
        bottom: calc(302px + env(safe-area-inset-bottom));
        max-width: calc(100% - 24px);
        margin: 0;
        padding: 9px 11px;
        border: 1px solid rgba(255, 255, 255, 0.82);
        border-radius: 12px;
        background: rgba(255, 255, 255, 0.97);
        color: #315366;
        font-size: 11px;
        font-weight: 700;
        line-height: 1.4;
        box-shadow: 0 6px 20px rgba(24, 43, 55, 0.16);
      }

      .location-status.is-error {
        color: #9d3046;
      }

      .sheet-open .current-location-button,
      .sheet-open .location-status {
        pointer-events: none;
        opacity: 0;
      }

      @keyframes location-pulse {
        from {
          opacity: 0.4;
          transform: scale(0.86);
        }

        to {
          opacity: 1;
          transform: scale(1.08);
        }
      }

      .map-attribution {
        position: absolute;
        z-index: 700;
        right: 10px;
        bottom: calc(237px + env(safe-area-inset-bottom));
        padding: 4px 7px;
        border-radius: 7px;
        background: rgba(255, 255, 255, 0.86);
        color: #596a74;
        font-size: 10px;
      }

      .map-attribution a {
        color: inherit;
        text-decoration: none;
      }

      .leaflet-control-zoom {
        margin-right: 12px !important;
        margin-bottom: calc(250px + env(safe-area-inset-bottom)) !important;
        overflow: hidden;
        border: 0 !important;
        border-radius: 14px !important;
        box-shadow: 0 6px 22px rgba(24, 43, 55, 0.19) !important;
        transition: opacity 0.2s ease;
      }

      .leaflet-control-zoom a {
        width: 40px !important;
        height: 40px !important;
        border: 0 !important;
        color: #17242d !important;
        font-weight: 500 !important;
        line-height: 38px !important;
      }

      .sheet-open .leaflet-control-zoom {
        pointer-events: none;
        opacity: 0;
      }

      .category-marker {
        border: 0 !important;
        background: transparent !important;
      }

      .category-marker .category-pin {
        display: grid;
        width: 30px;
        height: 30px;
        place-items: center;
        border: 2px solid #fff;
        border-radius: 50% 50% 50% 9px;
        transform: rotate(-45deg);
        background: #e9516c;
        color: #fff;
        box-shadow: 0 4px 11px rgba(120, 31, 50, 0.28);
        transition:
          transform 0.18s ease,
          background 0.18s ease;
      }

      .category-marker.is-lodging .category-pin {
        background: #2483e2;
        box-shadow: 0 4px 11px rgba(23, 99, 160, 0.28);
      }

      .category-marker .category-pin b {
        transform: rotate(45deg);
        font-size: 10px;
      }

      .category-marker.is-selected {
        z-index: 1000 !important;
      }

      .category-marker.is-selected .category-pin {
        transform: rotate(-45deg) scale(1.15);
        background: #17242d;
      }

      .category-marker.is-selected.is-lodging .category-pin {
        background: #1463b4;
      }

      .place-sheet {
        position: absolute;
        z-index: 900;
        left: 10px;
        right: 10px;
        bottom: max(10px, env(safe-area-inset-bottom));
        overflow: hidden;
        border: 1px solid rgba(255, 255, 255, 0.78);
        border-radius: 25px;
        background: rgba(255, 255, 255, 0.97);
        box-shadow: 0 17px 44px rgba(22, 43, 57, 0.24);
        backdrop-filter: blur(17px);
        transition: max-height 0.26s ease;
      }

      .place-sheet.is-collapsed {
        max-height: 236px;
      }

      .place-sheet.is-expanded {
        max-height: min(70svh, 640px);
      }

      .sheet-toggle {
        display: grid;
        grid-template-columns: 20px minmax(0, 1fr) auto 30px;
        width: 100%;
        min-height: 44px;
        align-items: center;
        gap: 10px;
        padding: 0 12px 0 16px;
        border: 0;
        background: transparent;
        color: #42535d;
        font-size: 12px;
        font-weight: 800;
        text-align: left;
        cursor: pointer;
      }

      .sheet-list-icon {
        width: 20px;
        height: 20px;
        color: #657680;
      }

      .sheet-count {
        display: grid;
        min-width: 26px;
        height: 24px;
        place-items: center;
        padding: 0 7px;
        border-radius: 999px;
        background: #fff0f3;
        color: #b53850;
        font-size: 11px;
        font-weight: 850;
      }

      .sheet-chevron {
        width: 30px;
        height: 30px;
        padding: 7px;
        border-radius: 50%;
        transform: rotate(0deg);
        background: #17242d;
        color: #fff;
        transition: transform 0.2s ease;
      }

      .place-sheet.is-expanded .sheet-chevron {
        transform: rotate(180deg);
      }

      .selected-place {
        display: grid;
        grid-template-columns: 92px minmax(0, 1fr);
        grid-template-rows: minmax(0, 1fr) auto;
        gap: 8px 12px;
        min-height: 192px;
        align-items: start;
        padding: 2px 14px 14px;
      }

      .selected-photo-wrap {
        position: relative;
        display: grid;
        grid-row: 1 / span 2;
        width: 92px;
        height: 132px;
        align-self: center;
        place-items: center;
        overflow: hidden;
        border-radius: 16px;
        background: #e8eef1;
      }

      .selected-image {
        display: block;
        width: 100%;
        height: 100%;
        object-fit: cover;
      }

      .selected-photo-wrap .place-symbol {
        position: absolute;
        right: 7px;
        bottom: 7px;
        width: 30px;
        height: 30px;
        border: 2px solid #fff;
        box-shadow: 0 3px 10px rgba(18, 39, 52, 0.22);
        font-size: 10px;
      }

      .place-symbol {
        display: grid;
        width: 40px;
        height: 40px;
        flex: 0 0 auto;
        place-items: center;
        border-radius: 50%;
        background: #e9516c;
        color: #fff;
        font-size: 13px;
        font-weight: 850;
      }

      .place-symbol.is-lodging {
        background: #2483e2;
      }

      .place-copy {
        display: block;
        min-width: 0;
        text-align: left;
      }

      .place-copy strong {
        display: block;
        overflow: hidden;
        font-size: 16px;
        letter-spacing: -0.025em;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .place-description {
        display: -webkit-box;
        overflow: hidden;
        margin-top: 6px;
        color: #42535d;
        font-size: 11px;
        line-height: 1.45;
        -webkit-box-orient: vertical;
        -webkit-line-clamp: 2;
      }

      .place-kind {
        display: inline-flex;
        width: fit-content;
        min-height: 20px;
        align-items: center;
        margin-bottom: 4px;
        padding: 0 7px;
        border-radius: 999px;
        background: #fff0f3;
        color: #b53850;
        font-size: 10px;
        font-weight: 850;
      }

      .place-copy small {
        display: block;
        overflow: hidden;
        margin-top: 5px;
        color: #6b7b85;
        font-size: 11px;
        line-height: 1.35;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .place-actions {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        min-width: 0;
        gap: 6px;
      }

      .place-action {
        display: inline-flex;
        min-height: 38px;
        align-items: center;
        justify-content: center;
        padding: 0 11px;
        border-radius: 12px;
        color: #fff;
        font-size: 11px;
        font-weight: 850;
        text-decoration: none;
        white-space: nowrap;
      }

      .naver-link {
        background: #03c75a;
      }

      .naver-route-link {
        background: #17242d;
      }

      .place-list {
        max-height: calc(min(70svh, 640px) - 44px);
        margin: 0;
        padding: 0 10px 16px;
        overflow-y: auto;
        overscroll-behavior: contain;
        list-style: none;
      }

      .place-list li + li {
        border-top: 1px solid #edf0f2;
      }

      .place-list-button {
        display: grid;
        grid-template-columns: 42px minmax(0, 1fr);
        gap: 10px;
        width: 100%;
        min-height: 66px;
        align-items: center;
        padding: 10px 5px;
        border: 0;
        border-radius: 14px;
        background: transparent;
        cursor: pointer;
      }

      .place-list-button:hover,
      .place-list-button:focus-visible,
      .place-list-button.is-selected {
        background: #f2f5f6;
      }

      .place-list-button.is-selected .place-symbol {
        background: #17242d;
      }

      .place-list-button.is-selected .place-symbol.is-lodging {
        background: #1463b4;
      }

      @media (max-width: 360px) {
        .map-header {
          top: max(8px, env(safe-area-inset-top));
          left: 8px;
          right: 8px;
          min-height: 88px;
          padding: 12px;
        }

        .overview-button {
          min-width: 66px;
          padding: 0 10px;
        }

        .place-sheet {
          left: 6px;
          right: 6px;
          bottom: max(6px, env(safe-area-inset-bottom));
        }

        .place-sheet.is-collapsed {
          max-height: 244px;
        }

        .selected-place {
          grid-template-columns: 82px minmax(0, 1fr);
          gap: 7px 10px;
          min-height: 200px;
          padding-right: 10px;
          padding-left: 10px;
        }

        .selected-photo-wrap {
          width: 82px;
          height: 126px;
        }

        .current-location-button {
          bottom: calc(258px + env(safe-area-inset-bottom));
        }

        .location-status {
          bottom: calc(310px + env(safe-area-inset-bottom));
        }

        .map-attribution {
          bottom: calc(251px + env(safe-area-inset-bottom));
        }

        .leaflet-control-zoom {
          margin-bottom: calc(264px + env(safe-area-inset-bottom)) !important;
        }
      }

      @media (min-width: 700px) {
        body {
          padding: 20px 0;
        }

        .travel-app {
          height: min(920px, calc(100vh - 40px));
          min-height: 700px;
          border-radius: 32px;
        }
      }

      @media (prefers-reduced-motion: reduce) {
        *,
        *::before,
        *::after {
          scroll-behavior: auto !important;
          transition-duration: 0.01ms !important;
        }
      }
    </style>
  </head>
  <body>
    <main class="travel-app">
      <div id="map" aria-label="속초, 양양, 강릉의 저장한 장소 14곳과 숙소 및 현재 위치 지도"></div>

      <header class="map-header">
        <div class="header-copy">
          <p class="eyebrow">TRAVEL LINK MAP</p>
          <h1>속초·양양·강릉</h1>
          <p class="place-count">저장한 위치 15곳</p>
        </div>
        <button id="overview-button" class="overview-button" type="button">
          전체 보기
        </button>
      </header>

      <p id="map-warning" class="map-warning" role="status" hidden>
        지도를 불러오지 못했어요. 아래 장소 목록과 네이버 원본 링크는 계속 사용할 수 있어요.
      </p>

      <button
        id="current-location-button"
        class="current-location-button"
        type="button"
        aria-label="현재 위치 표시"
        aria-pressed="false"
      >
        <span class="location-icon" aria-hidden="true">◎</span>
        <span>내 위치</span>
      </button>

      <p
        id="location-status"
        class="location-status"
        role="status"
        aria-live="polite"
        hidden
      ></p>

      <span class="map-attribution">
        <a
          href="https://www.openstreetmap.org/copyright"
          target="_blank"
          rel="noreferrer"
        >© OpenStreetMap</a>
        ·
        <a href="https://carto.com/attributions" target="_blank" rel="noreferrer">© CARTO</a>
      </span>

      <section id="place-sheet" class="place-sheet is-collapsed" aria-label="저장한 장소">
        <button
          id="sheet-toggle"
          class="sheet-toggle"
          type="button"
          aria-controls="place-list"
          aria-expanded="false"
          aria-label="장소 목록 15곳 펼치기"
        >
          <svg class="sheet-list-icon" viewBox="0 0 24 24" aria-hidden="true">
            <circle cx="4" cy="6" r="1.5" fill="currentColor"></circle>
            <circle cx="4" cy="12" r="1.5" fill="currentColor"></circle>
            <circle cx="4" cy="18" r="1.5" fill="currentColor"></circle>
            <path
              d="M9 6h11M9 12h11M9 18h11"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
            ></path>
          </svg>
          <span id="sheet-toggle-label">장소 목록</span>
          <span id="sheet-count" class="sheet-count" aria-hidden="true">15</span>
          <svg class="sheet-chevron" viewBox="0 0 24 24" aria-hidden="true">
            <path
              d="M7 14l5-5 5 5"
              fill="none"
              stroke="currentColor"
              stroke-width="2.2"
              stroke-linecap="round"
              stroke-linejoin="round"
            ></path>
          </svg>
        </button>

        <article id="selected-place" class="selected-place" aria-live="polite">
          <span class="selected-photo-wrap">
            <img
              id="selected-image"
              class="selected-image"
              alt="체스터톤스속초 대표 사진"
              referrerpolicy="no-referrer"
              decoding="async"
            />
            <span id="selected-symbol" class="place-symbol is-lodging" aria-label="숙소">숙</span>
          </span>
          <span class="place-copy">
            <span id="selected-kind" class="place-kind">숙소</span>
            <strong id="selected-name">체스터톤스속초</strong>
            <span id="selected-description" class="place-description"></span>
            <small id="selected-address">강원 속초시 엑스포로 109</small>
          </span>
          <span class="place-actions">
            <a
              id="selected-link"
              class="place-action naver-link"
              href="https://m.place.naver.com/accommodation/1616363964/home"
              target="_blank"
              rel="noreferrer"
            >장소 보기</a>
            <a
              id="selected-route-link"
              class="place-action naver-route-link"
              href="nmap://route/car"
            >자동차 길찾기</a>
          </span>
        </article>

        <ol id="place-list" class="place-list" hidden></ol>
      </section>
    </main>

    <script
      src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
      integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
      crossorigin=""
    ></script>
    <script>
      (() => {
        "use strict";

        const places = JSON.parse(document.getElementById("place-data").textContent);
        const lodging = JSON.parse(document.getElementById("lodging-data").textContent);
        const locations = [lodging, ...places];
        const CATEGORY_META = Object.freeze({
          restaurant: { symbol: "식", label: "맛집" },
          cafe: { symbol: "카", label: "카페" },
          bakery: { symbol: "빵", label: "빵·디저트" },
          lodging: { symbol: "숙", label: "숙소" },
        });
        const placeById = new Map(locations.map((place) => [place.id, place]));
        const markerById = new Map();
        const listButtonById = new Map();
        const mapWarning = document.getElementById("map-warning");
        const placeSheet = document.getElementById("place-sheet");
        const sheetToggle = document.getElementById("sheet-toggle");
        const placeList = document.getElementById("place-list");
        const selectedPlace = document.getElementById("selected-place");
        const selectedSymbol = document.getElementById("selected-symbol");
        const selectedImage = document.getElementById("selected-image");
        const selectedKind = document.getElementById("selected-kind");
        const selectedName = document.getElementById("selected-name");
        const selectedDescription = document.getElementById("selected-description");
        const selectedAddress = document.getElementById("selected-address");
        const selectedLink = document.getElementById("selected-link");
        const selectedRouteLink = document.getElementById("selected-route-link");
        const overviewButton = document.getElementById("overview-button");
        const currentLocationButton = document.getElementById("current-location-button");
        const locationStatus = document.getElementById("location-status");
        let selectedId = lodging.id;
        let sheetExpanded = false;
        let map = null;
        let allBounds = null;
        let locationWatchId = null;
        let currentPosition = null;
        let userLocationMarker = null;
        let userAccuracyCircle = null;
        let centerOnNextLocation = false;
        let locationStatusTimer = null;
        let naverRouteFallbackTimer = null;
        let routeVisibilityHandler = null;

        function buildNaverCarRouteUrl(place) {
          const params = new URLSearchParams({
            dlat: String(place.lat),
            dlng: String(place.lng),
            dname: place.name,
            appname: `${window.location.origin}${window.location.pathname}`,
          });
          return `nmap://route/car?${params.toString()}`;
        }

        function clearNaverRouteFallback() {
          window.clearTimeout(naverRouteFallbackTimer);
          naverRouteFallbackTimer = null;
          if (routeVisibilityHandler) {
            document.removeEventListener("visibilitychange", routeVisibilityHandler);
            routeVisibilityHandler = null;
          }
        }

        function handleNaverRouteClick(event) {
          event.preventDefault();
          const place = placeById.get(selectedId);
          if (!place) return;

          clearNaverRouteFallback();
          let appOpened = false;
          routeVisibilityHandler = () => {
            if (document.hidden) appOpened = true;
          };
          document.addEventListener("visibilitychange", routeVisibilityHandler);

          try {
            window.location.href = buildNaverCarRouteUrl(place);
          } catch {
            clearNaverRouteFallback();
            window.location.assign(place.sourceUrl);
            return;
          }

          naverRouteFallbackTimer = window.setTimeout(() => {
            clearNaverRouteFallback();
            if (!appOpened && !document.hidden) {
              window.location.assign(place.sourceUrl);
            }
          }, 1500);
        }

        function buildPlaceList() {
          for (const place of locations) {
            const category = CATEGORY_META[place.type];
            const item = document.createElement("li");
            const button = document.createElement("button");
            const symbol = document.createElement("span");
            const copy = document.createElement("span");
            const name = document.createElement("strong");
            const address = document.createElement("small");

            button.type = "button";
            button.className = "place-list-button";
            button.dataset.placeId = place.id;
            button.setAttribute("aria-label", `${category.label} ${place.name}`);
            symbol.className = "place-symbol";
            symbol.classList.toggle("is-lodging", place.type === "lodging");
            symbol.textContent = category.symbol;
            symbol.setAttribute("aria-label", category.label);
            copy.className = "place-copy";
            name.textContent = place.name;
            address.textContent = place.address;
            copy.append(name, address);
            button.append(symbol, copy);
            button.addEventListener("click", () => selectPlace(place.id, true));
            item.append(button);
            placeList.append(item);
            listButtonById.set(place.id, button);
          }
        }

        function setSheetExpanded(expanded) {
          sheetExpanded = expanded;
          placeSheet.classList.toggle("is-expanded", expanded);
          placeSheet.classList.toggle("is-collapsed", !expanded);
          placeList.hidden = !expanded;
          selectedPlace.hidden = expanded;
          sheetToggle.setAttribute("aria-expanded", String(expanded));
          sheetToggle.setAttribute(
            "aria-label",
            expanded ? "장소 목록 접기" : "장소 목록 15곳 펼치기",
          );
          document.body.classList.toggle("sheet-open", expanded);
          window.setTimeout(() => map?.invalidateSize(), 280);
        }

        function handleSelectedImageError() {
          selectedImage.hidden = true;
        }

        function updateSelectedPlace(place) {
          const category = CATEGORY_META[place.type];
          selectedId = place.id;
          selectedImage.hidden = false;
          selectedImage.src = place.imageUrl;
          selectedImage.alt = `${place.name} 대표 사진`;
          selectedSymbol.textContent = category.symbol;
          selectedSymbol.classList.toggle("is-lodging", place.type === "lodging");
          selectedSymbol.setAttribute("aria-label", category.label);
          selectedKind.textContent = category.label;
          selectedKind.hidden = false;
          selectedName.textContent = place.name;
          selectedDescription.textContent = place.description;
          selectedAddress.textContent = place.address;
          selectedLink.href = place.sourceUrl;
          selectedLink.setAttribute("aria-label", `${place.name} 네이버 지도에서 열기`);
          selectedRouteLink.href = buildNaverCarRouteUrl(place);
          selectedRouteLink.setAttribute("aria-label", `${place.name}까지 자동차 길찾기`);

          for (const [id, marker] of markerById) {
            marker.getElement()?.classList.toggle("is-selected", id === selectedId);
            marker.setZIndexOffset(id === selectedId ? 1000 : 0);
          }
          for (const [id, button] of listButtonById) {
            button.classList.toggle("is-selected", id === selectedId);
            button.setAttribute("aria-current", id === selectedId ? "true" : "false");
          }
        }

        function selectPlace(placeId, moveMap) {
          const place = placeById.get(placeId);
          if (!place) return;
          updateSelectedPlace(place);
          setSheetExpanded(false);
          if (moveMap && map) {
            map.flyTo([place.lat, place.lng], Math.max(map.getZoom(), 14), {
              animate: !window.matchMedia("(prefers-reduced-motion: reduce)").matches,
              duration: 0.65,
            });
          }
        }

        function fitAllPlaces() {
          setSheetExpanded(false);
          if (map && allBounds) {
            map.fitBounds(allBounds, {
              paddingTopLeft: [48, 135],
              paddingBottomRight: [48, 178],
            });
          }
        }

        function showLocationStatus(message, isError = false) {
          window.clearTimeout(locationStatusTimer);
          locationStatus.textContent = message;
          locationStatus.classList.toggle("is-error", isError);
          locationStatus.hidden = false;
          locationStatusTimer = window.setTimeout(() => {
            locationStatus.hidden = true;
          }, 4500);
        }

        function moveMapToCurrentPosition() {
          if (!map || !currentPosition) return;
          map.flyTo(currentPosition, Math.max(map.getZoom(), 15), {
            animate: !window.matchMedia("(prefers-reduced-motion: reduce)").matches,
            duration: 0.65,
          });
        }

        function updateCurrentPosition(position) {
          if (!map) return;
          const latLng = [position.coords.latitude, position.coords.longitude];
          currentPosition = latLng;

          if (userAccuracyCircle) {
            userAccuracyCircle.setLatLng(latLng);
            userAccuracyCircle.setRadius(position.coords.accuracy);
          } else {
            userAccuracyCircle = L.circle(latLng, {
              radius: position.coords.accuracy,
              color: "#2483e2",
              fillColor: "#6eb6ff",
              fillOpacity: 0.13,
              weight: 1,
            }).addTo(map);
          }

          if (userLocationMarker) {
            userLocationMarker.setLatLng(latLng);
          } else {
            userLocationMarker = L.circleMarker(latLng, {
              radius: 8,
              color: "#ffffff",
              fillColor: "#2483e2",
              fillOpacity: 1,
              weight: 3,
            })
              .bindTooltip("내 위치", { direction: "top" })
              .addTo(map);
          }

          currentLocationButton.classList.remove("is-locating");
          currentLocationButton.setAttribute("aria-busy", "false");
          currentLocationButton.setAttribute("aria-pressed", "true");
          currentLocationButton.setAttribute("aria-label", "현재 위치 표시 끄기");
          showLocationStatus("현재 위치를 표시했어요.");

          if (centerOnNextLocation) {
            centerOnNextLocation = false;
            moveMapToCurrentPosition();
          }
        }

        function getLocationErrorMessage(error) {
          switch (error.code) {
            case 1:
              return "위치 권한이 거부되었어요. 브라우저 설정에서 위치 권한을 허용해주세요.";
            case 2:
              return "현재 위치를 확인하지 못했어요. 잠시 후 다시 시도해주세요.";
            case 3:
              return "위치를 확인하는 데 시간이 오래 걸리고 있어요. 다시 시도해주세요.";
            default:
              return "현재 위치를 확인하지 못했어요.";
          }
        }

        function stopLocationWatch() {
          if (locationWatchId !== null && navigator.geolocation) {
            navigator.geolocation.clearWatch(locationWatchId);
            locationWatchId = null;
          }
        }

        function clearCurrentLocationLayers() {
          if (map && userLocationMarker) {
            map.removeLayer(userLocationMarker);
          }
          if (map && userAccuracyCircle) {
            map.removeLayer(userAccuracyCircle);
          }
          userLocationMarker = null;
          userAccuracyCircle = null;
          currentPosition = null;
        }

        function disableCurrentLocation(showMessage = true) {
          stopLocationWatch();
          clearCurrentLocationLayers();
          centerOnNextLocation = false;
          currentLocationButton.classList.remove("is-locating");
          currentLocationButton.setAttribute("aria-busy", "false");
          currentLocationButton.setAttribute("aria-pressed", "false");
          currentLocationButton.setAttribute("aria-label", "현재 위치 표시");
          if (showMessage) {
            showLocationStatus("현재 위치 표시를 껐어요.");
          }
        }

        function handleLocationError(error) {
          disableCurrentLocation(false);
          currentLocationButton.setAttribute("aria-label", "현재 위치 다시 확인");
          showLocationStatus(getLocationErrorMessage(error), true);
        }

        function startLocationWatch() {
          if (!map) {
            showLocationStatus("지도를 불러온 뒤 현재 위치를 확인할 수 있어요.", true);
            return;
          }
          if (!navigator.geolocation) {
            showLocationStatus("현재 위치를 확인할 수 없는 브라우저예요.", true);
            return;
          }

          centerOnNextLocation = true;
          currentLocationButton.classList.add("is-locating");
          currentLocationButton.setAttribute("aria-busy", "true");
          currentLocationButton.setAttribute("aria-pressed", "true");
          currentLocationButton.setAttribute("aria-label", "현재 위치 확인 중");
          showLocationStatus("현재 위치를 확인하고 있어요.");
          locationWatchId = navigator.geolocation.watchPosition(
            updateCurrentPosition,
            handleLocationError,
            {
              enableHighAccuracy: true,
              timeout: 10000,
              maximumAge: 5000,
            },
          );
        }

        function handleCurrentLocationClick() {
          if (locationWatchId !== null) {
            disableCurrentLocation();
            return;
          }
          startLocationWatch();
        }

        function initializeMap() {
          if (typeof window.L === "undefined") {
            mapWarning.hidden = false;
            return;
          }

          map = L.map("map", {
            zoomControl: false,
            attributionControl: false,
            minZoom: 6,
            maxZoom: 18,
          });

          const tiles = L.tileLayer(
            "https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png",
            { maxZoom: 20, subdomains: "abcd" },
          );
          tiles.on("tileerror", () => {
            mapWarning.hidden = false;
          });
          tiles.on("load", () => {
            mapWarning.hidden = true;
          });
          tiles.addTo(map);
          L.control.zoom({ position: "bottomright" }).addTo(map);

          allBounds = L.latLngBounds(locations.map((place) => [place.lat, place.lng]));

          for (const place of locations) {
            const category = CATEGORY_META[place.type];
            const icon = L.divIcon({
              className: `category-marker${place.type === "lodging" ? " is-lodging" : ""}`,
              html: `<span class="category-pin"><b aria-hidden="true">${category.symbol}</b></span>`,
              iconSize: [34, 40],
              iconAnchor: [17, 37],
            });
            const marker = L.marker([place.lat, place.lng], {
              icon,
              title: place.name,
              keyboard: true,
            }).addTo(map);
            marker.on("click", () => selectPlace(place.id, false));
            markerById.set(place.id, marker);
          }

          fitAllPlaces();
          updateSelectedPlace(lodging);
        }

        selectedImage.addEventListener("error", handleSelectedImageError);
        buildPlaceList();
        updateSelectedPlace(lodging);
        setSheetExpanded(false);
        sheetToggle.addEventListener("click", () => setSheetExpanded(!sheetExpanded));
        overviewButton.addEventListener("click", fitAllPlaces);
        currentLocationButton.addEventListener("click", handleCurrentLocationClick);
        selectedRouteLink.addEventListener("click", handleNaverRouteClick);
        window.addEventListener("pagehide", () => {
          disableCurrentLocation(false);
          clearNaverRouteFallback();
        });
        initializeMap();
      })();
    </script>
  </body>
</html>
